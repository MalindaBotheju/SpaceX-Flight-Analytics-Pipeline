name: Run SpaceX Daily Pipeline

on:
  schedule:
    # This tells GitHub to run your pipeline automatically every day at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # This allows you to trigger it manually via the GitHub website anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your code repository onto the GitHub virtual machine
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install the tools your script needs to run
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas duckdb

    # 4. Execute your Python and SQL script
    - name: Run Data Pipeline
      run: python pipeline.py

    # 5. Save the updated database file back to your GitHub profile automatically
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add analytics.duckdb
        git commit -m "Automated daily database update" || echo "No changes to commit"
        git push